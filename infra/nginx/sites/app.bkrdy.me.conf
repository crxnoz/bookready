# /etc/nginx/sites-available/app.bkrdy.me
#
# Editor SPA — Next.js running under pm2 (process name: bookready-web)
# on localhost:3000. nginx terminates TLS, enforces the Cloudflare-only
# whitelist, then proxies to Next.
#
# TODO when copying to the server:
#   - Confirm the Next.js pm2 process is listening on 127.0.0.1:3000
#     (`pm2 show bookready-web` → look for `script args` / `node_args`).
#     If it's on a different port, change `proxy_pass` below.
#   - Confirm the Let's Encrypt cert paths match what certbot installed.

# HTTP → HTTPS redirect. Cloudflare also redirects, but keep this so
# the origin behaves correctly if/when Cloudflare is bypassed for testing.
server {
    listen      80;
    listen [::]:80;
    server_name app.bkrdy.me;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.bkrdy.me;

    # ── Cloudflare-only access ──────────────────────────────────────────
    # $is_cloudflare comes from the geo block in cloudflare-geo.conf
    # (loaded at the http {} level). Keyed on $realip_remote_addr so it
    # sees the ORIGINAL TCP source IP, before realip rewrites
    # $remote_addr to the CF-Connecting-IP value for Laravel. Reject any
    # connection not originating from a Cloudflare edge.
    if ($is_cloudflare = 0) { return 403; }

    # ── TLS ─────────────────────────────────────────────────────────────
    # Single wildcard cert covers app.bkrdy.me, api.bkrdy.me, bkrdy.me,
    # and every *.bkrdy.me tenant subdomain. Reuses the same files in
    # all three site configs.
    ssl_certificate     /etc/letsencrypt/live/bkrdy.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkrdy.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Authenticated Origin Pulls (optional but recommended) ───────────
    # Enable in Cloudflare dashboard → SSL/TLS → Origin Server → Authenticated
    # Origin Pulls, then uncomment the next 3 lines. Means even if the
    # cloudflare-allow.conf list drifts, the origin still rejects clients
    # that can't present Cloudflare's client certificate.
    #
    # ssl_client_certificate /etc/nginx/cloudflare-origin-pull-ca.pem;
    # ssl_verify_client       on;
    # ssl_verify_depth        1;

    # ── Security headers ────────────────────────────────────────────────
    # Just HSTS here — Next.js owns the rest per-host (see web/next.config.mjs
    # and the comment in /etc/nginx/snippets/hsts.conf for why).
    include /etc/nginx/snippets/hsts.conf;

    # ── Proxy to Next.js ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket / hot-reload support (only relevant in dev, but harmless).
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Aggressively cache Next's hashed static assets — they're content-
    # addressed so the URL changes on rebuild.
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
    }

    access_log /var/log/nginx/app.bkrdy.me.access.log;
    error_log  /var/log/nginx/app.bkrdy.me.error.log;
}
