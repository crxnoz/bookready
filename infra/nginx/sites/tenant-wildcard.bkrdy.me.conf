# /etc/nginx/sites-available/tenant-wildcard.bkrdy.me
#
# Wildcard server block for tenant booking sites: https://{slug}.bkrdy.me
# (lushstudio.bkrdy.me, etc.).
#
# Same Next.js process as app.bkrdy.me, but the request lands on a
# different host header — Next's middleware reads $host, extracts the
# slug, and rewrites to /site/{slug} internally. We don't need a separate
# pm2 process for tenants.
#
# Requires a wildcard TLS cert covering *.bkrdy.me. Get it via certbot
# with the DNS-01 challenge (HTTP-01 doesn't work for wildcards):
#
#   sudo certbot certonly --dns-cloudflare \
#     --dns-cloudflare-credentials /root/.secrets/cloudflare.ini \
#     -d 'bkrdy.me' -d '*.bkrdy.me'
#
# TODO when copying to the server:
#   - Confirm the wildcard cert path (likely /etc/letsencrypt/live/bkrdy.me/).
#   - This block intentionally does NOT match `app.bkrdy.me` or
#     `api.bkrdy.me` — those have their own server blocks that take
#     precedence (nginx prefers an exact server_name match over a
#     wildcard match).

server {
    listen      80;
    listen [::]:80;
    server_name *.bkrdy.me bkrdy.me www.bkrdy.me;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.bkrdy.me bkrdy.me www.bkrdy.me;

    # ── Cloudflare-only access ──────────────────────────────────────────
    # See app.bkrdy.me.conf for the full explanation of why this uses
    # $is_cloudflare (geo block) instead of allow/deny.
    if ($is_cloudflare = 0) { return 403; }

    # ── TLS (wildcard cert) ─────────────────────────────────────────────
    # Same wildcard cert used by app.bkrdy.me + api.bkrdy.me — its SANs
    # are *.bkrdy.me + bkrdy.me, which covers every host this block serves.
    ssl_certificate     /etc/letsencrypt/live/bkrdy.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkrdy.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Authenticated Origin Pulls (optional but recommended) ───────────
    # ssl_client_certificate /etc/nginx/cloudflare-origin-pull-ca.pem;
    # ssl_verify_client       on;
    # ssl_verify_depth        1;

    # ── Security headers ────────────────────────────────────────────────
    # Just HSTS — Next.js owns CSP, XFO, COOP/CORP/etc. per-host. CRITICAL:
    # don't blanket-add X-Frame-Options here, it would break the editor's
    # website-preview iframe (commit 5d8baf1).
    include /etc/nginx/snippets/hsts.conf;

    # ── Proxy to Next.js ────────────────────────────────────────────────
    # Same upstream as app.bkrdy.me; Next's app/(public)/site/[slug]/page.tsx
    # reads the host header to figure out which tenant to render.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable" always;
    }

    access_log /var/log/nginx/tenant-wildcard.bkrdy.me.access.log;
    error_log  /var/log/nginx/tenant-wildcard.bkrdy.me.error.log;
}
