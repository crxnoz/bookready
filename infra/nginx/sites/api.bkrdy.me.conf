# /etc/nginx/sites-available/api.bkrdy.me
#
# Laravel API. Document root is api/public/ (Laravel's standard layout);
# everything else routes to public/index.php via PHP-FPM.
#
# TODO when copying to the server:
#   - Verify the PHP-FPM socket path. Ubuntu 24.04 with PHP 8.3 (which
#     the composer.json `"php": "^8.2"` constraint will allow) defaults
#     to /run/php/php8.3-fpm.sock. Run `ls /run/php/` to confirm.
#   - Verify the document root matches the deploy layout described in
#     CLAUDE.md (`/var/www/bookready-api/api/public`).
#   - Confirm the Let's Encrypt cert paths.

server {
    listen      80;
    listen [::]:80;
    server_name api.bkrdy.me;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bkrdy.me;

    # ── Cloudflare-only access ──────────────────────────────────────────
    include /etc/nginx/snippets/cloudflare-allow.conf;

    # ── TLS ─────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.bkrdy.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bkrdy.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Authenticated Origin Pulls (optional but recommended) ───────────
    # ssl_client_certificate /etc/nginx/cloudflare-origin-pull-ca.pem;
    # ssl_verify_client       on;
    # ssl_verify_depth        1;

    # ── Security headers ────────────────────────────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── Laravel layout ──────────────────────────────────────────────────
    root  /var/www/bookready-api/api/public;
    index index.php;

    # Upload size cap — must be >= the 10 MB cap enforced in
    # UploadsController + PublicBookingAnswerUploadController, plus some
    # slack for form-data framing.
    client_max_body_size 12M;

    # Stripe webhook endpoints are NOT excluded from the Cloudflare-only
    # allow list above. Stripe webhook deliveries from Stripe's own
    # infrastructure WILL be blocked unless Cloudflare is in the path.
    # That's fine — Stripe delivers to the public hostname (api.bkrdy.me),
    # which now resolves to Cloudflare, so the request travels:
    #   Stripe → Cloudflare → origin (allowed, source = Cloudflare IP)
    # Verify after cutover by triggering a test webhook from the Stripe
    # dashboard → Developers → Webhooks → Send test webhook.

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS           on;

        # Pass through the real client IP to PHP-FPM so Laravel's
        # Request::ip() returns the visitor's IP (used by every per-IP
        # throttle in routes/api.php).
        fastcgi_param REMOTE_ADDR     $remote_addr;
    }

    # Deny dot-files (e.g. .env, .git) — defensive, public/ shouldn't
    # contain any, but if a deploy ever screws up we don't want to leak.
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/api.bkrdy.me.access.log;
    error_log  /var/log/nginx/api.bkrdy.me.error.log;
}
