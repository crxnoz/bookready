# HTTPS-only enforcement.
#
# This is the ONLY response header nginx adds — every other security
# header (X-Frame-Options, X-Content-Type-Options, Referrer-Policy,
# Permissions-Policy, Cross-Origin-{Opener,Resource}-Policy,
# X-Permitted-Cross-Domain-Policies, Content-Security-Policy) is set by
# Next.js per-host via web/next.config.mjs.
#
# Why nginx doesn't add the others: the editor's website-preview iframe
# needs to embed tenant sites, which requires XFO omitted + CSP
# frame-ancestors allowlisting the editor host. Next.js handles this
# per-host (one rule for editor hosts, another for tenant subdomains).
# If nginx blanket-added X-Frame-Options: DENY here, the response would
# carry two XFO headers — browsers usually take the first, and the
# preview iframe silently breaks. See commit 5d8baf1 for the fix Next
# is making.
#
# HSTS is the exception: Laravel doesn't set it on JSON API responses,
# Next.js doesn't set it (it's an origin-server concern), and we want it
# on every response from every host. Setting it once in nginx covers
# all three sites + every error path.
#
# `preload` is included — only safe to keep here once you've registered
# bkrdy.me at https://hstspreload.org/. Until then, max-age=31536000
# (1 year) still gives every returning visitor HTTPS-only behavior;
# removal would just take up to a year instead of 6+ months for
# preloaded entries.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
