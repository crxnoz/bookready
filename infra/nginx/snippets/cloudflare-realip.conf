# Cloudflare real-IP recovery.
#
# Without this, every request that reaches the origin appears to come from
# a Cloudflare edge IP (172.67.*, 104.21.*, etc.), so per-IP rate limits
# in Laravel (Phase S5 throttles on /auth/*, /public/sites/*/appointments,
# uploads) would lump all traffic together — one bad actor would exhaust
# the limit for every honest visitor.
#
# real_ip_header CF-Connecting-IP tells nginx: when this list of trusted
# upstreams sends a CF-Connecting-IP header, rewrite $remote_addr to that
# value. Laravel then sees the real client IP via Request::ip().
#
# Include from the http { } block in /etc/nginx/nginx.conf, NOT from
# server blocks. Pairs with cloudflare-geo.conf — set_real_ip_from
# trusts the CF-Connecting-IP header from these ranges, and the geo
# block enforces "must arrive from a Cloudflare edge" via the original
# $realip_remote_addr (preserved by this same realip module before
# it rewrites $remote_addr).
#
# The set_real_ip_from list below is intentionally static — it's the
# published Cloudflare edge range CIDR aggregates. The per-IP geo
# block in cloudflare-geo.conf is what gets refreshed weekly; this
# file just tells nginx whose CF-Connecting-IP it should trust. If
# Cloudflare ever adds a new top-level range, update this file by hand
# (rare — happens maybe once a year).

# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header    CF-Connecting-IP;
real_ip_recursive on;
