# Security response headers applied to every host.
#
# Mirrors the headers Next.js sets via web/next.config.mjs so the origin
# also enforces them for non-Next responses (raw 4xx/5xx pages from nginx,
# Laravel-rendered errors, the future static fallback page, etc.).
#
# `always` is intentional — without it, nginx skips add_header on 4xx/5xx
# responses, so unauthenticated paths would silently drop the header.
#
# Include from each server { } block.

# HTTPS-only for 1 year, including every subdomain (covers app, api, and
# all current/future tenant subdomains). `preload` is required for
# inclusion in browser HSTS preload lists (https://hstspreload.org/).
# Do NOT add `preload` until you're sure HTTPS works for every subdomain
# you'll ever serve — once preloaded, removal takes 6+ months.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

add_header X-Content-Type-Options                "nosniff"                              always;
add_header X-Frame-Options                       "DENY"                                 always;
add_header Referrer-Policy                       "strict-origin-when-cross-origin"      always;
add_header Permissions-Policy                    "camera=(), microphone=(), geolocation=()" always;
add_header Cross-Origin-Opener-Policy            "same-origin"                          always;
add_header Cross-Origin-Resource-Policy          "same-site"                            always;
add_header X-Permitted-Cross-Domain-Policies     "none"                                 always;
